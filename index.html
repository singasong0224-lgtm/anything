<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZeroDrop</title>
<style>
  :root {
    --bg0: #0a0e14;
    --bg1: #111824;
    --ink: #e8eef6;
    --ink-dim: #8a97a8;
    --accent: #5fd0c8;
    --panel: rgba(255, 255, 255, 0.04);
    --panel-line: rgba(255, 255, 255, 0.10);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg0);
    color: var(--ink);
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  #zd-root {
    position: relative;
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #stage {
    flex: 1 1 auto;
    width: 100%;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  canvas {
    display: block;
    touch-action: none;
    background:
      radial-gradient(1200px 600px at 50% -10%, #16202e 0%, transparent 60%),
      linear-gradient(180deg, var(--bg1) 0%, var(--bg0) 100%);
    border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 18px;
    padding: 24px;
  }
  .hidden { display: none !important; }
  .title-name {
    font-size: clamp(40px, 12vw, 64px);
    font-weight: 700;
    letter-spacing: 0.12em;
    margin: 0;
    background: linear-gradient(180deg, #eafcff, #6fe0d6 70%, #3aa9a0);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 30px rgba(95, 208, 200, 0.25);
  }
  .subtle {
    color: var(--ink-dim);
    font-size: 13px;
    letter-spacing: 0.08em;
    line-height: 1.7;
    margin: 0;
  }
  .btn {
    appearance: none;
    border: 1px solid var(--panel-line);
    background: var(--panel);
    color: var(--ink);
    font: inherit;
    font-size: 16px;
    letter-spacing: 0.06em;
    padding: 14px 30px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.08s ease, background 0.15s ease, border-color 0.15s ease;
  }
  .btn:hover { background: rgba(95, 208, 200, 0.10); border-color: rgba(95, 208, 200, 0.5); }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    border-color: rgba(95, 208, 200, 0.55);
    background: rgba(95, 208, 200, 0.14);
    color: #eafcff;
  }
  .result-title {
    font-size: clamp(32px, 9vw, 48px);
    font-weight: 700;
    letter-spacing: 0.14em;
    margin: 0;
  }
  .row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .footer-note {
    position: absolute;
    bottom: 10px;
    left: 0; right: 0;
    text-align: center;
    color: var(--ink-dim);
    font-size: 11px;
    letter-spacing: 0.06em;
  }
  .icon-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 46px;
    height: 46px;
    border-radius: 12px;
    border: 1px solid var(--panel-line);
    background: rgba(12, 18, 26, 0.6);
    color: var(--ink);
    font-size: 15px;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 5;
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
  }
  .icon-btn:active { transform: translateY(1px); }

  /* On-screen controller (touch only). Left: move row. Center: pause. Right: rotate / drop stack. */
  #touch-controls {
    flex: 0 0 auto;
    width: 100%;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 10px 12px;
    /* Lift the whole controller up off the bottom edge so it's easy to reach. */
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + clamp(26px, 9vh, 84px));
  }
  .pad { display: flex; gap: 8px; align-items: center; }
  .pad-right { flex-direction: column; }
  .ctl {
    width: clamp(46px, 14.5vw, 68px);
    height: clamp(46px, 13vw, 60px);
    border-radius: 14px;
    border: 1px solid var(--panel-line);
    background: rgba(20, 28, 38, 0.85);
    color: var(--ink);
    font-size: clamp(18px, 6vw, 26px);
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.08s ease, transform 0.05s ease;
  }
  .ctl:active {
    background: rgba(95, 208, 200, 0.22);
    border-color: rgba(95, 208, 200, 0.55);
    transform: translateY(1px);
  }
  .ctl-util {
    width: clamp(44px, 12vw, 58px);
    font-size: clamp(14px, 4.4vw, 18px);
    letter-spacing: 0.1em;
    opacity: 0.92;
  }
  .ctl-rotate {
    width: clamp(66px, 21vw, 94px);
    font-size: clamp(24px, 7.5vw, 32px);
    background: rgba(95, 208, 200, 0.12);
    border-color: rgba(95, 208, 200, 0.6);
    box-shadow: inset 0 0 0 1px rgba(95, 208, 200, 0.25);
  }
  .ctl-drop {
    width: clamp(66px, 21vw, 94px);
    height: clamp(46px, 12vw, 56px);
    font-size: clamp(14px, 4.4vw, 18px);
    font-weight: 700;
    letter-spacing: 0.06em;
    color: #ffd7e6;
    background: rgba(214, 73, 138, 0.18);
    border-color: rgba(214, 73, 138, 0.55);
  }
  .ctl-drop:active {
    background: rgba(214, 73, 138, 0.34);
    border-color: rgba(214, 73, 138, 0.85);
  }
</style>
</head>
<body>
<div id="zd-root">
  <div id="stage">
    <canvas id="zd-canvas"></canvas>
  </div>

  <!-- On-screen controller (shown only on touch devices while playing) -->
  <div id="touch-controls" class="hidden">
    <div class="pad">
      <button class="ctl" data-act="left" aria-label="左へ">◀</button>
      <button class="ctl" data-act="soft" aria-label="高速落下">▼</button>
      <button class="ctl" data-act="right" aria-label="右へ">▶</button>
    </div>
    <div class="pad">
      <button class="ctl ctl-util" data-act="pause" aria-label="一時停止">❚❚</button>
    </div>
    <div class="pad pad-right">
      <button class="ctl ctl-rotate" data-act="rotR" aria-label="回転">↻</button>
      <button class="ctl ctl-drop" data-act="hard" aria-label="一気に落とす">↓ DROP</button>
    </div>
  </div>

  <!-- Title -->
  <div class="overlay" id="overlay-title">
    <h1 class="title-name">ZeroDrop</h1>
    <p class="subtle">同じ色のクリスタルを4つ以上つなげて消す。<br>連鎖でおじゃまを送り、相手を埋めろ。</p>
    <p class="subtle" style="margin-bottom:-6px;">難易度を選んでスタート</p>
    <div class="row">
      <button class="btn" data-diff="EASY">EASY</button>
      <button class="btn btn-primary" data-diff="NORMAL">NORMAL</button>
      <button class="btn" data-diff="HARD">HARD</button>
    </div>
    <p class="subtle">← → 移動 ・ ↑/X/Z 回転 ・ ↓ 高速落下 ・ Space 即落下</p>
  </div>

  <!-- Result -->
  <div class="overlay hidden" id="overlay-result">
    <h2 class="result-title" id="result-title">WIN</h2>
    <p class="subtle" id="result-score">スコア 0</p>
    <div class="row">
      <button class="btn btn-primary" id="btn-retry">もう一度</button>
      <button class="btn" id="btn-title">タイトルへ</button>
    </div>
  </div>

  <!-- Pause button (visible only while playing, desktop) -->
  <button class="icon-btn hidden" id="btn-pause" aria-label="一時停止">II</button>

  <!-- Pause overlay -->
  <div class="overlay hidden" id="overlay-pause">
    <h2 class="result-title">一時停止</h2>
    <p class="subtle">P / Esc でも再開できます</p>
    <div class="row">
      <button class="btn btn-primary" id="btn-resume">再開</button>
      <button class="btn" id="btn-pause-title">タイトルへ</button>
    </div>
  </div>

  <div class="footer-note">Phase 3 — disruptions</div>
</div>

<script>
"use strict";
(function () {
  // =====================================================================
  // ZeroDrop — Phase 2: vs CPU (two boards, CPU AI, garbage blocks)
  // Canvas 2D + Vanilla JS. No external libraries.
  // =====================================================================

  // ---- Field constants -------------------------------------------------
  const COLS = 6;
  const VISIBLE_ROWS = 12;
  const HIDDEN_ROWS = 2;
  const ROWS = VISIBLE_ROWS + HIDDEN_ROWS;
  const CELL = 40;
  const NUM_COLORS = 5;
  const SPAWN_COL = 2;

  const EMPTY = 0;
  const OJAMA = 9; // neutral garbage block

  const COLORS = {
    1: { core: "#7ff0ec", edge: "#1fb9b0", glow: "#9ffff9" }, // cyan
    2: { core: "#f58ad6", edge: "#c2389b", glow: "#ffb0e6" }, // magenta
    3: { core: "#f6e07a", edge: "#caa023", glow: "#fff0a8" }, // yellow
    4: { core: "#a7e87a", edge: "#5fae2f", glow: "#c8ffa0" }, // lime
    5: { core: "#f6a96a", edge: "#cc6a1f", glow: "#ffc999" }, // orange
    9: { core: "#7c8694", edge: "#454e5a", glow: "#9aa4b2" }, // ojama (gray)
  };

  // ---- Timing ----------------------------------------------------------
  const GRAVITY_MS = 650;
  const SOFT_DROP_MS = 45;
  const CLEAR_FLASH_MS = 330;
  const SETTLE_PAUSE_MS = 110;
  const SPAWN_PAUSE_MS = 90;
  const GARBAGE_PAUSE_MS = 220;

  // ---- Garbage tuning --------------------------------------------------
  const GARBAGE_RATE = 70;   // score per 1 garbage block (large = fewer)
  const MAX_GARBAGE_DROP = 30; // cap garbage dropped per turn (5 rows)

  // ---- Disruption / debuffs (Phase 3) ----------------------------------
  const GAUGE_MAX = 750;        // gauge needed to auto-fire a debuff (larger = rarer)
  const SPEED_FACTOR = 0.42;    // fall-interval multiplier under スピードアップ
  const TELOP_MS = 1600;        // effect-name telop duration
  const WARN_MS = 950;          // warning flash duration
  const SHUFFLE_FAKE_MS = 130;  // how often the fake NEXT changes under シャッフル
  // Brutal effects run short (long = a death sentence); manageable ones last longer.
  const DEBUFFS = [
    { key: "flip",     name: "アンチグラビティ", ms: 6000 },
    { key: "mirror",   name: "左右反転",         ms: 8000 },
    { key: "blackout", name: "ブラックアウト",   ms: 6000 },
    { key: "speed",    name: "スピードアップ",   ms: 9000 },
    { key: "shuffle",  name: "シャッフル",       ms: 11000 },
  ];

  // ---- Geometry helpers ------------------------------------------------
  function childOffset(orient) {
    switch (orient & 3) {
      case 0: return { dr: -1, dc: 0 };
      case 1: return { dr: 0, dc: 1 };
      case 2: return { dr: 1, dc: 0 };
      default: return { dr: 0, dc: -1 };
    }
  }
  function randColor() { return 1 + Math.floor(Math.random() * NUM_COLORS); }

  // ---- Pure grid helpers (used by the CPU's look-ahead simulation) -----
  function cloneGrid(grid) { return grid.map(function (row) { return row.slice(); }); }

  function gridApplyGravity(grid) {
    for (let c = 0; c < COLS; c++) {
      let write = ROWS - 1;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (grid[r][c] !== EMPTY) {
          const v = grid[r][c];
          grid[r][c] = EMPTY;
          grid[write][c] = v;
          write--;
        }
      }
    }
  }

  function gridFindGroups(grid) {
    const seen = [];
    for (let r = 0; r < ROWS; r++) seen.push(new Array(COLS).fill(false));
    const groups = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const v = grid[r][c];
        if (v === EMPTY || v === OJAMA || seen[r][c]) continue;
        const stack = [[r, c]];
        seen[r][c] = true;
        const group = [];
        while (stack.length) {
          const cur = stack.pop();
          const cr = cur[0], cc = cur[1];
          group.push({ row: cr, col: cc });
          const nb = [[cr - 1, cc], [cr + 1, cc], [cr, cc - 1], [cr, cc + 1]];
          for (const n of nb) {
            const nr = n[0], nc = n[1];
            if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
            if (!seen[nr][nc] && grid[nr][nc] === v) { seen[nr][nc] = true; stack.push([nr, nc]); }
          }
        }
        if (group.length >= 4) groups.push(group);
      }
    }
    return groups;
  }

  // Fully resolve a grid (clears + chains). Returns {cleared, chain}.
  function gridResolve(grid) {
    let chain = 0, cleared = 0;
    gridApplyGravity(grid);
    while (true) {
      const groups = gridFindGroups(grid);
      if (groups.length === 0) break;
      chain++;
      for (const g of groups) {
        for (const cell of g) {
          // remove adjacent ojama too (matches Board.finishClearing)
          const nb = [[cell.row - 1, cell.col], [cell.row + 1, cell.col],
                      [cell.row, cell.col - 1], [cell.row, cell.col + 1]];
          for (const n of nb) {
            const nr = n[0], nc = n[1];
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc] === OJAMA) {
              grid[nr][nc] = EMPTY;
            }
          }
          grid[cell.row][cell.col] = EMPTY;
          cleared++;
        }
      }
      gridApplyGravity(grid);
    }
    return { cleared: cleared, chain: chain };
  }

  function gridDropRow(grid, c) {
    for (let r = ROWS - 1; r >= 0; r--) if (grid[r][c] === EMPTY) return r;
    return -1;
  }

  // Simulate dropping a pair (pivot colour a, satellite b) at a placement.
  // Returns a new resolved-ready grid, or null if the placement is impossible.
  function placePair(grid, col, orient, a, b) {
    const g = cloneGrid(grid);
    if (orient === 0 || orient === 2) {
      if (col < 0 || col >= COLS) return null;
      const dr = gridDropRow(g, col);
      if (dr < 1) return null; // need two stacked cells
      if (orient === 0) { g[dr][col] = a; g[dr - 1][col] = b; }
      else { g[dr][col] = b; g[dr - 1][col] = a; }
    } else if (orient === 1) {
      if (col < 0 || col + 1 >= COLS) return null;
      const d0 = gridDropRow(g, col), d1 = gridDropRow(g, col + 1);
      if (d0 < 0 || d1 < 0) return null;
      const rr = Math.min(d0, d1);
      g[rr][col] = a; g[rr][col + 1] = b;
    } else {
      if (col - 1 < 0 || col >= COLS) return null;
      const d0 = gridDropRow(g, col), d1 = gridDropRow(g, col - 1);
      if (d0 < 0 || d1 < 0) return null;
      const rr = Math.min(d0, d1);
      g[rr][col] = a; g[rr][col - 1] = b;
    }
    gridApplyGravity(g);
    return g;
  }

  // =====================================================================
  // Board — one field's full state. Two of these run side by side.
  // =====================================================================
  class Board {
    constructor() {
      this.onSend = null;   // function(n): route garbage to the opponent
      this.onDebuff = null; // function(): the gauge filled -> hit the opponent
      this.reset();
    }

    reset() {
      this.grid = [];
      for (let r = 0; r < ROWS; r++) this.grid.push(new Array(COLS).fill(EMPTY));
      this.piece = null;
      this.next = this.makePair();
      this.score = 0;
      this.chain = 0;
      this.maxChain = 0;
      this.chainScore = 0;        // score accumulated during current resolution
      this.pendingGarbage = 0;    // ojama waiting to drop on this board
      this.garbageCarry = 0;      // fractional garbage carried between attacks
      this.gauge = 0;             // disruption gauge (fills from chains)
      this.debuffs = { flip: 0, mirror: 0, blackout: 0, speed: 0, shuffle: 0 }; // remaining ms
      this.telop = null;          // { text, t } effect-name banner
      this.warnT = 0;             // warning-flash timer
      this.fakeNext = this.makePair(); // bogus NEXT shown under シャッフル
      this.fakeTimer = 0;
      this.particles = [];
      this.clearing = [];
      this.phase = "control";
      this.timer = 0;
      this.fallTimer = 0;
      this.softDrop = false;
      this.gameOver = false;
      this.flashT = 0;
      this.spawnPiece();
    }

    makePair() { return { a: randColor(), b: randColor() }; }

    spawnPiece() {
      const pair = this.next;
      this.next = this.makePair();
      this.piece = {
        row: HIDDEN_ROWS - 1, col: SPAWN_COL, orient: 0,
        a: pair.a, b: pair.b, offsetY: 0,
      };
      const childRow = this.piece.row + childOffset(0).dr;
      if (!this.isFree(this.piece.row, this.piece.col) || !this.isFree(childRow, this.piece.col)) {
        this.gameOver = true;
        this.phase = "over";
        this.piece = null;
      } else {
        this.phase = "control";
        this.fallTimer = 0;
      }
    }

    isFree(row, col) {
      if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return false;
      return this.grid[row][col] === EMPTY;
    }

    cellsOf(row, col, orient) {
      const o = childOffset(orient);
      return [{ row: row, col: col }, { row: row + o.dr, col: col + o.dc }];
    }

    fits(row, col, orient) {
      const cells = this.cellsOf(row, col, orient);
      for (const c of cells) if (!this.isFree(c.row, c.col)) return false;
      return true;
    }

    // ---- Player / CPU actions ----
    move(dir) {
      if (this.phase !== "control" || !this.piece) return;
      if (this.debuffs.mirror > 0) dir = -dir; // 左右反転
      const p = this.piece;
      if (this.fits(p.row, p.col + dir, p.orient)) p.col += dir;
    }

    rotate(dir) {
      if (this.phase !== "control" || !this.piece) return;
      const p = this.piece;
      const no = (p.orient + (dir > 0 ? 1 : 3)) & 3;
      if (this.fits(p.row, p.col, no)) { p.orient = no; return; }
      const o = childOffset(no);
      const kicks = [
        { dr: 0, dc: -o.dc },
        { dr: -o.dr, dc: 0 },
        { dr: 0, dc: o.dc ? 0 : (p.col < COLS / 2 ? 1 : -1) },
      ];
      for (const k of kicks) {
        if (this.fits(p.row + k.dr, p.col + k.dc, no)) {
          p.row += k.dr; p.col += k.dc; p.orient = no; return;
        }
      }
    }

    setSoftDrop(on) { this.softDrop = on; }

    hardDrop() {
      if (this.phase !== "control" || !this.piece) return;
      const p = this.piece;
      while (this.fits(p.row + 1, p.col, p.orient)) p.row += 1;
      p.offsetY = 0;
      this.lockPiece();
    }

    // ---- Locking & resolution ----
    lockPiece() {
      const p = this.piece;
      const cells = this.cellsOf(p.row, p.col, p.orient);
      this.grid[cells[0].row][cells[0].col] = p.a;
      if (cells[1].row >= 0 && cells[1].row < ROWS) this.grid[cells[1].row][cells[1].col] = p.b;
      this.piece = null;
      this.chainScore = 0; // start of a fresh resolution
      this.applyGravity();
      this.beginResolve();
    }

    applyGravity() { gridApplyGravity(this.grid); }
    findGroups() { return gridFindGroups(this.grid); }

    beginResolve() {
      const groups = this.findGroups();
      if (groups.length === 0) {
        this.finalizeChain();
        return;
      }
      this.chain += 1;
      if (this.chain > this.maxChain) this.maxChain = this.chain;

      let count = 0;
      this.clearing = [];
      for (const g of groups) {
        for (const cell of g) { this.clearing.push(cell); count += 1; }
      }
      const bonus = Math.pow(2, this.chain - 1);
      const stepScore = Math.round(count * 10 * bonus);
      this.score += stepScore;
      this.chainScore += stepScore;

      this.phase = "clearing";
      this.timer = CLEAR_FLASH_MS;
      this.flashT = 0;
    }

    // Chain finished: convert score to garbage, offset, send, then maybe drop.
    finalizeChain() {
      const units = this.chainScore + this.garbageCarry;
      let sent = Math.floor(units / GARBAGE_RATE);
      this.garbageCarry = units % GARBAGE_RATE;
      // Outgoing garbage first cancels our own incoming (counter mechanic).
      if (this.pendingGarbage > 0 && sent > 0) {
        const off = Math.min(this.pendingGarbage, sent);
        this.pendingGarbage -= off;
        sent -= off;
      }
      if (sent > 0 && this.onSend) this.onSend(sent);

      // Disruption gauge fills from the chain (bigger chain = faster).
      this.gauge += this.chainScore;
      if (this.gauge >= GAUGE_MAX) {
        this.gauge = 0;
        if (this.onDebuff) this.onDebuff();
      }
      this.chain = 0;

      if (this.pendingGarbage > 0) {
        this.phase = "garbage";
        this.timer = GARBAGE_PAUSE_MS;
      } else {
        this.phase = "spawn";
        this.timer = SPAWN_PAUSE_MS;
      }
    }

    finishClearing() {
      // Ojama adjacent to a cleared cell get knocked out (one hit).
      const ojamaOut = new Set();
      for (const cell of this.clearing) {
        const nb = [[cell.row - 1, cell.col], [cell.row + 1, cell.col],
                    [cell.row, cell.col - 1], [cell.row, cell.col + 1]];
        for (const n of nb) {
          const r = n[0], c = n[1];
          if (r >= 0 && r < ROWS && c >= 0 && c < COLS && this.grid[r][c] === OJAMA) {
            ojamaOut.add(r * COLS + c);
          }
        }
      }
      for (const cell of this.clearing) {
        const v = this.grid[cell.row][cell.col];
        this.spawnShatter(cell.col, cell.row, v);
        this.grid[cell.row][cell.col] = EMPTY;
      }
      for (const key of ojamaOut) {
        const r = Math.floor(key / COLS), c = key % COLS;
        this.spawnShatter(c, r, OJAMA);
        this.grid[r][c] = EMPTY;
      }
      this.clearing = [];
      this.applyGravity();
      this.phase = "settle";
      this.timer = SETTLE_PAUSE_MS;
    }

    addPendingGarbage(n) { this.pendingGarbage += n; }

    // A debuff lands on this board: start its timer + show warning/telop.
    applyDebuff(def) {
      this.debuffs[def.key] = def.ms;
      this.telop = { text: def.name, t: TELOP_MS };
      this.warnT = WARN_MS;
      if (def.key === "shuffle") this.fakeTimer = 0;
    }

    updateDebuffs(dt) {
      for (const k in this.debuffs) {
        if (this.debuffs[k] > 0) this.debuffs[k] = Math.max(0, this.debuffs[k] - dt);
      }
      if (this.telop) { this.telop.t -= dt; if (this.telop.t <= 0) this.telop = null; }
      if (this.warnT > 0) this.warnT = Math.max(0, this.warnT - dt);
      if (this.debuffs.shuffle > 0) {
        this.fakeTimer -= dt;
        if (this.fakeTimer <= 0) { this.fakeNext = this.makePair(); this.fakeTimer = SHUFFLE_FAKE_MS; }
      }
    }

    dropRowOf(c) {
      for (let r = ROWS - 1; r >= 0; r--) if (this.grid[r][c] === EMPTY) return r;
      return -1;
    }

    dropGarbage() {
      let n = Math.min(this.pendingGarbage, MAX_GARBAGE_DROP);
      this.pendingGarbage -= n;
      const per = Math.floor(n / COLS);
      const rem = n % COLS;
      const cols = [0, 1, 2, 3, 4, 5];
      for (let i = cols.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const t = cols[i]; cols[i] = cols[j]; cols[j] = t;
      }
      const extra = new Set(cols.slice(0, rem));
      for (let c = 0; c < COLS; c++) {
        let add = per + (extra.has(c) ? 1 : 0);
        let dr = this.dropRowOf(c);
        while (add > 0 && dr >= 0) { this.grid[dr][c] = OJAMA; dr--; add--; }
      }
      this.applyGravity();
    }

    spawnShatter(col, row, colorId) {
      const col0 = COLORS[colorId] || COLORS[1];
      const cx = col * CELL + CELL / 2;
      const cy = (row - HIDDEN_ROWS) * CELL + CELL / 2;
      const n = 7;
      for (let i = 0; i < n; i++) {
        const ang = (Math.PI * 2 * i) / n + Math.random() * 0.6;
        const sp = 60 + Math.random() * 130;
        this.particles.push({
          x: cx, y: cy,
          vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp - 40,
          life: 1, size: 4 + Math.random() * 5,
          rot: Math.random() * Math.PI, vr: (Math.random() - 0.5) * 8,
          color: col0.core,
        });
      }
    }

    update(dt) {
      this.updateParticles(dt);
      this.updateDebuffs(dt);

      if (this.phase === "control" && this.piece) {
        let interval = this.softDrop ? SOFT_DROP_MS : GRAVITY_MS;
        if (this.debuffs.speed > 0) interval *= SPEED_FACTOR; // スピードアップ
        this.fallTimer += dt;
        while (this.fallTimer >= interval) {
          this.fallTimer -= interval;
          const p = this.piece;
          if (this.fits(p.row + 1, p.col, p.orient)) p.row += 1;
          else { this.fallTimer = 0; p.offsetY = 0; this.lockPiece(); return; }
        }
        const p = this.piece;
        if (this.fits(p.row + 1, p.col, p.orient)) p.offsetY = this.fallTimer / interval;
        else p.offsetY = 0;
      } else if (this.phase === "clearing") {
        this.timer -= dt;
        this.flashT = 1 - Math.max(0, this.timer) / CLEAR_FLASH_MS;
        if (this.timer <= 0) this.finishClearing();
      } else if (this.phase === "settle") {
        this.timer -= dt;
        if (this.timer <= 0) this.beginResolve();
      } else if (this.phase === "garbage") {
        this.timer -= dt;
        if (this.timer <= 0) { this.dropGarbage(); this.phase = "spawn"; this.timer = SPAWN_PAUSE_MS; }
      } else if (this.phase === "spawn") {
        this.timer -= dt;
        if (this.timer <= 0) this.spawnPiece();
      }
    }

    updateParticles(dt) {
      const s = dt / 1000;
      for (const pt of this.particles) {
        pt.vy += 520 * s;
        pt.x += pt.vx * s; pt.y += pt.vy * s;
        pt.rot += pt.vr * s; pt.life -= s * 1.7;
      }
      this.particles = this.particles.filter(function (p) { return p.life > 0; });
    }
  }

  // =====================================================================
  // CPU — chooses a placement via look-ahead, then steers the piece there.
  // =====================================================================
  const WEIGHTS = {
    EASY:   { clear: 1.0, chain: 0.0,  adj: 0.2, hsum: 0.05, hmax: 0.2, rand: 6,   randomPick: 0.5 },
    NORMAL: { clear: 2.0, chain: 2.0,  adj: 0.6, hsum: 0.15, hmax: 0.6, rand: 4,   randomPick: 0.25 },
    HARD:   { clear: 2.5, chain: 14.0, adj: 1.8, hsum: 0.25, hmax: 1.0, rand: 0.5, randomPick: 0.0 },
  };
  const CPU_SPEED = {
    EASY:   { think: 450, step: 300 },
    NORMAL: { think: 330, step: 220 },
    HARD:   { think: 110, step: 75 },
  };

  function evalGrid(g) {
    let adj = 0, hsum = 0, hmax = 0;
    const heights = new Array(COLS).fill(0);
    for (let c = 0; c < COLS; c++) {
      let h = 0;
      for (let r = 0; r < ROWS; r++) { if (g[r][c] !== EMPTY) { h = ROWS - r; break; } }
      heights[c] = h; hsum += h; if (h > hmax) hmax = h;
    }
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const v = g[r][c];
        if (v === EMPTY || v === OJAMA) continue;
        if (c + 1 < COLS && g[r][c + 1] === v) adj++;
        if (r + 1 < ROWS && g[r + 1][c] === v) adj++;
      }
    }
    return { adj: adj, hsum: hsum, hmax: hmax, heights: heights };
  }

  function chooseMove(board, diff) {
    const W = WEIGHTS[diff] || WEIGHTS.NORMAL;
    const a = board.piece.a, b = board.piece.b;
    let best = null, bestScore = -Infinity;
    const cand = [];
    for (let orient = 0; orient < 4; orient++) {
      for (let col = 0; col < COLS; col++) {
        const g = placePair(board.grid, col, orient, a, b);
        if (!g) continue;
        const sim = cloneGrid(g);
        const res = gridResolve(sim);
        const f = evalGrid(sim);
        let s = W.clear * res.cleared + W.chain * (res.chain * res.chain) + W.adj * f.adj
              - W.hsum * f.hsum - W.hmax * f.hmax;
        if (f.heights[2] >= ROWS - 2 || f.heights[3] >= ROWS - 2) s -= 1000;
        s += Math.random() * W.rand;
        cand.push({ col: col, orient: orient, score: s });
        if (s > bestScore) { bestScore = s; best = { col: col, orient: orient }; }
      }
    }
    if (!best) return { col: SPAWN_COL, orient: 0 };
    if (W.randomPick && Math.random() < W.randomPick && cand.length) {
      const r = cand[Math.floor(Math.random() * cand.length)];
      return { col: r.col, orient: r.orient };
    }
    return best;
  }

  // A purely random legal placement (used when the CPU is "confused").
  function randomMove(board) {
    for (let t = 0; t < 24; t++) {
      const orient = Math.floor(Math.random() * 4);
      const col = Math.floor(Math.random() * COLS);
      if (placePair(board.grid, col, orient, board.piece.a, board.piece.b)) return { col: col, orient: orient };
    }
    return chooseMove(board, "EASY");
  }

  function makeCpu(board, diff) {
    const sp = CPU_SPEED[diff] || CPU_SPEED.NORMAL;
    let decidedFor = null, target = null, thinkT = 0, stepT = 0;
    return {
      update: function (dt) {
        if (board.gameOver) return;
        if (board.phase !== "control" || !board.piece) { thinkT = 0; return; }
        if (board.piece !== decidedFor) { decidedFor = board.piece; target = null; thinkT = 0; stepT = 0; }
        // Visual debuffs can't fool the AI's grid reading, so simulate
        // confusion instead: slower thinking + a chance of a random drop.
        const confused = board.debuffs.flip > 0 || board.debuffs.blackout > 0 || board.debuffs.shuffle > 0;
        if (!target) {
          thinkT += dt;
          if (thinkT >= sp.think * (confused ? 1.8 : 1)) {
            target = (confused && Math.random() < 0.4) ? randomMove(board) : chooseMove(board, diff);
            stepT = 0;
          }
          return;
        }
        stepT += dt;
        if (stepT >= sp.step) {
          stepT = 0;
          const p = board.piece;
          if (p.orient !== target.orient) board.rotate(1);
          else if (p.col < target.col) board.move(1);
          else if (p.col > target.col) board.move(-1);
          else { board.hardDrop(); decidedFor = null; target = null; }
        }
      },
    };
  }

  // =====================================================================
  // Renderer — pure drawing from Board state.
  // =====================================================================
  const HIDDEN_COLOR = { core: "#2b333e", edge: "#1a2027", glow: "#3a4350" };

  function drawCrystal(ctx, x, y, size, colorId, opts) {
    opts = opts || {};
    const col = opts.hidden ? HIDDEN_COLOR : (COLORS[colorId] || COLORS[1]);
    const cx = x + size / 2, cy = y + size / 2;
    const r = size * 0.40;
    const alpha = opts.alpha == null ? 1 : opts.alpha;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(cx, cy);

    const glow = ctx.createRadialGradient(0, 0, r * 0.2, 0, 0, r * 1.5);
    glow.addColorStop(0, hexA(col.glow, 0.55 * alpha));
    glow.addColorStop(1, hexA(col.glow, 0));
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(0, 0, r * 1.5, 0, Math.PI * 2); ctx.fill();

    const sides = 6;
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const ang = -Math.PI / 2 + (Math.PI * 2 * i) / sides;
      const px = Math.cos(ang) * r, py = Math.sin(ang) * r;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    const body = ctx.createLinearGradient(0, -r, 0, r);
    body.addColorStop(0, col.core); body.addColorStop(1, col.edge);
    ctx.fillStyle = body; ctx.fill();

    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const ang = -Math.PI / 2 + (Math.PI * 2 * i) / sides;
      const px = Math.cos(ang) * r * 0.5, py = Math.sin(ang) * r * 0.5;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fillStyle = hexA("#ffffff", 0.22 * alpha); ctx.fill();

    ctx.lineWidth = Math.max(1, size * 0.045);
    ctx.strokeStyle = hexA(col.glow, 0.7 * alpha);
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const ang = -Math.PI / 2 + (Math.PI * 2 * i) / sides;
      const px = Math.cos(ang) * r, py = Math.sin(ang) * r;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.stroke();

    // Ojama: dark cracks so it reads as "neutral / locked".
    if (colorId === OJAMA) {
      ctx.lineWidth = Math.max(1, size * 0.04);
      ctx.strokeStyle = hexA("#1b2026", 0.8 * alpha);
      ctx.beginPath();
      ctx.moveTo(-r * 0.45, -r * 0.15); ctx.lineTo(0, r * 0.12); ctx.lineTo(r * 0.4, -r * 0.2);
      ctx.moveTo(0, r * 0.12); ctx.lineTo(-r * 0.12, r * 0.5);
      ctx.stroke();
    }

    ctx.restore();
  }

  function hexA(hex, a) {
    const h = hex.replace("#", "");
    const r = parseInt(h.substring(0, 2), 16);
    const g = parseInt(h.substring(2, 4), 16);
    const b = parseInt(h.substring(4, 6), 16);
    return "rgba(" + r + "," + g + "," + b + "," + a + ")";
  }

  // =====================================================================
  // Game shell — canvas sizing, loop, input, screen state.
  // =====================================================================
  const canvas = document.getElementById("zd-canvas");
  const ctx = canvas.getContext("2d");

  // Two-board layout (player on the left, CPU on the right).
  const PAD = 14;
  const GAP = 26;
  const HEADER_H = 80;
  const FIELD_W = COLS * CELL;
  const FIELD_H = VISIBLE_ROWS * CELL;
  const BASE_W = PAD * 2 + FIELD_W * 2 + GAP;
  const BASE_H = PAD * 2 + HEADER_H + FIELD_H;

  let dpr = 1;
  let viewScale = 1;
  const isTouch = ("ontouchstart" in window) || (navigator.maxTouchPoints > 0);
  const stageEl = document.getElementById("stage");

  function resize() {
    const availW = Math.min(stageEl.clientWidth, 560) - 8;
    const availH = stageEl.clientHeight - 8;
    viewScale = Math.min(availW / BASE_W, availH / BASE_H, 1.4);
    if (viewScale <= 0 || !isFinite(viewScale)) viewScale = 1;
    dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(BASE_W * viewScale * dpr);
    canvas.height = Math.round(BASE_H * viewScale * dpr);
    canvas.style.width = Math.round(BASE_W * viewScale) + "px";
    canvas.style.height = Math.round(BASE_H * viewScale) + "px";
  }
  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", function () { setTimeout(resize, 120); });

  const ambient = [];
  for (let i = 0; i < 26; i++) {
    ambient.push({ x: Math.random() * BASE_W, y: Math.random() * BASE_H,
      r: 0.6 + Math.random() * 1.8, vy: 4 + Math.random() * 10, a: 0.05 + Math.random() * 0.18 });
  }
  function updateAmbient(dt) {
    const s = dt / 1000;
    for (const p of ambient) {
      p.y -= p.vy * s;
      if (p.y < -4) { p.y = BASE_H + 4; p.x = Math.random() * BASE_W; }
    }
  }

  // ---- Screen state ----
  const SCREEN = { TITLE: "title", PLAYING: "playing", RESULT: "result" };
  let screen = SCREEN.TITLE;
  let board = null;       // player's board (driven by input)
  let cpuBoard = null;    // CPU's board
  let cpuCtrl = null;
  let difficulty = "NORMAL";
  let paused = false;
  let matchEnded = false;

  const elTitle = document.getElementById("overlay-title");
  const elResult = document.getElementById("overlay-result");
  const elResultTitle = document.getElementById("result-title");
  const elResultScore = document.getElementById("result-score");
  const elPause = document.getElementById("overlay-pause");
  const elBtnPause = document.getElementById("btn-pause");
  const elTouch = document.getElementById("touch-controls");
  const elFooter = document.querySelector(".footer-note");
  let stopAllTouchRepeats = function () {};

  function showScreen(s) {
    screen = s;
    paused = false;
    stopAllTouchRepeats();
    elTitle.classList.toggle("hidden", s !== SCREEN.TITLE);
    elResult.classList.toggle("hidden", s !== SCREEN.RESULT);
    elPause.classList.add("hidden");
    elBtnPause.classList.toggle("hidden", s !== SCREEN.PLAYING || isTouch);
    elTouch.classList.toggle("hidden", !(isTouch && s === SCREEN.PLAYING));
    elFooter.classList.toggle("hidden", s !== SCREEN.TITLE);
    resize();
  }

  function setPaused(on) {
    if (screen !== SCREEN.PLAYING) return;
    if (matchEnded) return;
    paused = on;
    if (board) board.setSoftDrop(false);
    keyHeld.down = false;
    stopAllTouchRepeats();
    elPause.classList.toggle("hidden", !on);
    elBtnPause.classList.toggle("hidden", on || isTouch);
    elTouch.classList.toggle("hidden", on || !(isTouch && screen === SCREEN.PLAYING));
  }

  function startGame(diff) {
    difficulty = diff || difficulty || "NORMAL";
    board = new Board();
    cpuBoard = new Board();
    board.onSend = function (n) { cpuBoard.addPendingGarbage(n); };
    cpuBoard.onSend = function (n) { board.addPendingGarbage(n); };
    var pick = function () { return DEBUFFS[Math.floor(Math.random() * DEBUFFS.length)]; };
    board.onDebuff = function () { cpuBoard.applyDebuff(pick()); };
    cpuBoard.onDebuff = function () { board.applyDebuff(pick()); };
    cpuCtrl = makeCpu(cpuBoard, difficulty);
    matchEnded = false;
    showScreen(SCREEN.PLAYING);
  }

  function endGame(result) {
    showScreen(SCREEN.RESULT);
    elResultTitle.textContent = result === "WIN" ? "WIN" : "LOSE";
    elResultTitle.style.color = result === "WIN" ? "#7fe0d6" : "#f58ad6";
    elResultScore.textContent =
      "あなた " + board.score + " ・ CPU " + cpuBoard.score + "（" + difficulty + "）";
  }

  // Title difficulty buttons start the match.
  document.querySelectorAll("[data-diff]").forEach(function (btn) {
    btn.addEventListener("click", function () { startGame(btn.getAttribute("data-diff")); });
  });
  document.getElementById("btn-retry").addEventListener("click", function () { startGame(difficulty); });
  document.getElementById("btn-title").addEventListener("click", function () { showScreen(SCREEN.TITLE); });
  elBtnPause.addEventListener("click", function () { setPaused(true); });
  document.getElementById("btn-resume").addEventListener("click", function () { setPaused(false); });
  document.getElementById("btn-pause-title").addEventListener("click", function () { showScreen(SCREEN.TITLE); });

  // ---- Keyboard input (player board) ----
  const keyHeld = {};
  window.addEventListener("keydown", function (e) {
    if (screen !== SCREEN.PLAYING || !board) return;
    if (e.key === "p" || e.key === "P" || e.key === "Escape") { setPaused(!paused); e.preventDefault(); return; }
    if (paused) return;
    let handled = true;
    switch (e.key) {
      case "ArrowLeft": board.move(-1); break;
      case "ArrowRight": board.move(1); break;
      case "ArrowUp": case "x": case "X": board.rotate(1); break;
      case "z": case "Z": board.rotate(-1); break;
      case "ArrowDown": board.setSoftDrop(true); keyHeld.down = true; break;
      case " ": if (!keyHeld.space) { board.hardDrop(); keyHeld.space = true; } break;
      default: handled = false;
    }
    if (handled) e.preventDefault();
  });
  window.addEventListener("keyup", function (e) {
    if (e.key === "ArrowDown") { if (board) board.setSoftDrop(false); keyHeld.down = false; }
    if (e.key === " ") keyHeld.space = false;
  });

  // ---- On-screen controller (player board) ----
  function bindTouchControls() {
    const repeatTimers = {};
    const REPEAT_DELAY = 200, REPEAT_RATE = 70;
    function startRepeat(act, fn) {
      stopRepeat(act);
      const tick = function () { fn(); repeatTimers[act] = setTimeout(tick, REPEAT_RATE); };
      repeatTimers[act] = setTimeout(tick, REPEAT_DELAY);
    }
    function stopRepeat(act) { if (repeatTimers[act]) { clearTimeout(repeatTimers[act]); delete repeatTimers[act]; } }
    stopAllTouchRepeats = function () { for (const k in repeatTimers) stopRepeat(k); };

    function press(act) {
      if (!board || screen !== SCREEN.PLAYING || paused || board.gameOver) return;
      switch (act) {
        case "left": board.move(-1); startRepeat(act, function () { board.move(-1); }); break;
        case "right": board.move(1); startRepeat(act, function () { board.move(1); }); break;
        case "soft": board.setSoftDrop(true); break;
        case "rotL": board.rotate(-1); break;
        case "rotR": board.rotate(1); break;
        case "hard": board.hardDrop(); break;
        case "pause": setPaused(true); break;
      }
    }
    function release(act) { stopRepeat(act); if (act === "soft" && board) board.setSoftDrop(false); }

    elTouch.querySelectorAll(".ctl").forEach(function (btn) {
      const act = btn.getAttribute("data-act");
      btn.addEventListener("pointerdown", function (e) {
        e.preventDefault();
        if (btn.setPointerCapture) { try { btn.setPointerCapture(e.pointerId); } catch (_) {} }
        press(act);
      });
      btn.addEventListener("pointerup", function (e) { e.preventDefault(); release(act); });
      btn.addEventListener("pointercancel", function () { release(act); });
      btn.addEventListener("lostpointercapture", function () { release(act); });
      btn.addEventListener("contextmenu", function (e) { e.preventDefault(); });
    });
  }

  // ---- Render ----
  function render() {
    ctx.save();
    ctx.scale(viewScale * dpr, viewScale * dpr);
    ctx.clearRect(0, 0, BASE_W, BASE_H);

    for (const p of ambient) {
      ctx.fillStyle = hexA("#bfe9e4", p.a);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }

    if ((screen === SCREEN.PLAYING || screen === SCREEN.RESULT) && board && cpuBoard) {
      renderField(board, PAD, PAD, "YOU");
      renderField(cpuBoard, PAD + FIELD_W + GAP, PAD, "CPU");
    }
    ctx.restore();
  }

  function renderField(b, ox, oy, label) {
    // ---- Header ----
    ctx.save();
    ctx.fillStyle = "rgba(255,255,255,0.035)";
    roundRect(ctx, ox, oy, FIELD_W, HEADER_H - 6, 10); ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.08)"; ctx.lineWidth = 1;
    roundRect(ctx, ox, oy, FIELD_W, HEADER_H - 6, 10); ctx.stroke();

    ctx.textAlign = "left";
    ctx.fillStyle = "#cfe9e4"; ctx.font = "700 15px system-ui, sans-serif";
    ctx.fillText(label, ox + 12, oy + 19);
    ctx.fillStyle = "#e8eef6"; ctx.font = "700 20px system-ui, sans-serif";
    ctx.fillText(String(b.score), ox + 12, oy + 42);
    if (b.pendingGarbage > 0) {
      ctx.fillStyle = "#ffb86b"; ctx.font = "600 12px system-ui, sans-serif";
      ctx.fillText("おじゃま +" + b.pendingGarbage, ox + 12, oy + 58);
    }

    // NEXT (faked while under シャッフル)
    const nx = (b.debuffs.shuffle > 0) ? b.fakeNext : b.next;
    ctx.textAlign = "right";
    ctx.fillStyle = "#8a97a8"; ctx.font = "10px system-ui, sans-serif";
    ctx.fillText("NEXT", ox + FIELD_W - 12, oy + 14);
    const ms = 18, mx = ox + FIELD_W - 12 - ms, my = oy + 18;
    drawCrystal(ctx, mx, my, ms, nx.b, {});
    drawCrystal(ctx, mx, my + ms, ms, nx.a, {});

    // Disruption gauge
    const gx = ox + 12, gw = FIELD_W - 24, gy = oy + HEADER_H - 16, gh = 7;
    ctx.fillStyle = "rgba(255,255,255,0.08)";
    roundRect(ctx, gx, gy, gw, gh, 3.5); ctx.fill();
    const gf = Math.max(0, Math.min(1, b.gauge / GAUGE_MAX));
    if (gf > 0) {
      const grad = ctx.createLinearGradient(gx, 0, gx + gw, 0);
      grad.addColorStop(0, "#3aa9a0"); grad.addColorStop(1, "#7fe0d6");
      ctx.fillStyle = grad;
      roundRect(ctx, gx, gy, Math.max(gh, gw * gf), gh, 3.5); ctx.fill();
    }
    ctx.restore();

    // ---- Field ----
    const fx = ox, fy = oy + HEADER_H;
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,0.28)";
    roundRect(ctx, fx - 6, fy - 6, FIELD_W + 12, FIELD_H + 12, 12); ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.08)"; ctx.lineWidth = 1;
    roundRect(ctx, fx - 6, fy - 6, FIELD_W + 12, FIELD_H + 12, 12); ctx.stroke();

    ctx.save();
    roundRect(ctx, fx, fy, FIELD_W, FIELD_H, 6); ctx.clip();

    // アンチグラビティ: flip the field contents vertically.
    if (b.debuffs.flip > 0) {
      const cyf = fy + FIELD_H / 2;
      ctx.translate(0, cyf); ctx.scale(1, -1); ctx.translate(0, -cyf);
    }

    ctx.strokeStyle = "rgba(255,255,255,0.035)"; ctx.lineWidth = 1;
    for (let c = 1; c < COLS; c++) {
      ctx.beginPath(); ctx.moveTo(fx + c * CELL, fy); ctx.lineTo(fx + c * CELL, fy + FIELD_H); ctx.stroke();
    }

    const clearingSet = new Set(b.clearing.map(function (c) { return c.row * COLS + c.col; }));
    for (let r = HIDDEN_ROWS; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const v = b.grid[r][c];
        if (v === EMPTY) continue;
        const x = fx + c * CELL, y = fy + (r - HIDDEN_ROWS) * CELL;
        let alpha = 1;
        if (clearingSet.has(r * COLS + c)) {
          const f = b.flashT;
          const pulse = 0.55 + 0.45 * Math.abs(Math.sin(f * Math.PI * 3));
          alpha = f > 0.7 ? pulse * (1 - (f - 0.7) / 0.3) : pulse;
        }
        drawCrystal(ctx, x, y, CELL, v, { alpha: alpha });
      }
    }

    if (b.piece && b.phase === "control") {
      const p = b.piece;
      const o = childOffset(p.orient);
      const interp = p.offsetY;
      const hidden = b.debuffs.blackout > 0; // ブラックアウト
      const py = (p.row - HIDDEN_ROWS + interp) * CELL;
      drawPieceCell(fx, fy, p.col, py, p.a, hidden);
      const cy = (p.row + o.dr - HIDDEN_ROWS + interp) * CELL;
      drawPieceCell(fx, fy, p.col + o.dc, cy, p.b, hidden);
    }

    for (const pt of b.particles) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, pt.life));
      ctx.translate(fx + pt.x, fy + pt.y);
      ctx.rotate(pt.rot);
      ctx.fillStyle = pt.color;
      ctx.fillRect(-pt.size / 2, -pt.size / 2, pt.size, pt.size);
      ctx.restore();
    }
    ctx.restore(); // end clip (and flip)

    // ---- Overlays drawn upright over the field ----
    // Warning flash on a fresh debuff.
    if (b.warnT > 0) {
      const w = b.warnT / WARN_MS;
      const pulse = Math.abs(Math.sin((1 - w) * Math.PI * 5));
      ctx.save();
      ctx.globalAlpha = 0.55 * w;
      ctx.strokeStyle = "#ff5a7a"; ctx.lineWidth = 6;
      roundRect(ctx, fx + 3, fy + 3, FIELD_W - 6, FIELD_H - 6, 6); ctx.stroke();
      ctx.globalAlpha = 0.16 * w * pulse;
      ctx.fillStyle = "#ff3a5a";
      roundRect(ctx, fx, fy, FIELD_W, FIELD_H, 6); ctx.fill();
      ctx.restore();
    }

    // Active-debuff chips (top of the field).
    let chipY = fy + 8;
    ctx.textAlign = "left";
    for (const def of DEBUFFS) {
      const msLeft = b.debuffs[def.key];
      if (msLeft <= 0) continue;
      const txt = def.name + " " + Math.ceil(msLeft / 1000);
      ctx.font = "600 11px system-ui, sans-serif";
      const tw = ctx.measureText(txt).width + 14;
      ctx.fillStyle = "rgba(24,10,20,0.72)";
      roundRect(ctx, fx + 8, chipY, tw, 18, 9); ctx.fill();
      ctx.fillStyle = "#ffb0d8";
      ctx.fillText(txt, fx + 15, chipY + 13);
      chipY += 22;
    }

    // Effect-name telop banner.
    if (b.telop) {
      const tin = Math.min(1, (TELOP_MS - b.telop.t) / 160);
      const tout = Math.min(1, b.telop.t / 240);
      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(tin, tout));
      const bw = FIELD_W - 16, bh = 48, bxx = fx + 8, byy = fy + FIELD_H / 2 - 24;
      ctx.fillStyle = "rgba(8,10,16,0.82)";
      roundRect(ctx, bxx, byy, bw, bh, 10); ctx.fill();
      ctx.strokeStyle = "rgba(245,138,214,0.85)"; ctx.lineWidth = 2;
      roundRect(ctx, bxx, byy, bw, bh, 10); ctx.stroke();
      ctx.textAlign = "center";
      ctx.fillStyle = "#9aa4b2"; ctx.font = "10px system-ui, sans-serif";
      ctx.fillText("妨害発動", fx + FIELD_W / 2, byy + 16);
      ctx.fillStyle = "#ffd7e6"; ctx.font = "700 19px system-ui, sans-serif";
      ctx.fillText(b.telop.text, fx + FIELD_W / 2, byy + 37);
      ctx.restore();
    }

    if (b.gameOver) {
      ctx.fillStyle = "rgba(8,12,18,0.6)";
      roundRect(ctx, fx, fy, FIELD_W, FIELD_H, 6); ctx.fill();
      ctx.textAlign = "center";
      ctx.fillStyle = "#f58ad6"; ctx.font = "700 22px system-ui, sans-serif";
      ctx.fillText("TOP OUT", fx + FIELD_W / 2, fy + FIELD_H / 2);
    }
    ctx.restore();
  }

  function drawPieceCell(ox, oy, col, yWithinField, colorId, hidden) {
    if (yWithinField + CELL <= 0) return;
    drawCrystal(ctx, ox + col * CELL, oy + yWithinField, CELL, colorId, { hidden: hidden });
  }

  function roundRect(ctx, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ---- Main loop ----
  let last = performance.now();
  function loop(now) {
    let dt = now - last;
    last = now;
    if (dt > 100) dt = 100;

    updateAmbient(dt);

    if (screen === SCREEN.PLAYING && board && cpuBoard && !paused) {
      cpuCtrl.update(dt);
      board.update(dt);
      cpuBoard.update(dt);
      if (!matchEnded && (board.gameOver || cpuBoard.gameOver)) {
        matchEnded = true;
        const playerLost = board.gameOver;
        elBtnPause.classList.add("hidden");
        elTouch.classList.add("hidden");
        stopAllTouchRepeats();
        setTimeout(function () { endGame(playerLost ? "LOSE" : "WIN"); }, 800);
      }
    } else if (screen === SCREEN.RESULT) {
      if (board) board.updateParticles(dt);
      if (cpuBoard) cpuBoard.updateParticles(dt);
    }

    render();
    requestAnimationFrame(loop);
  }

  // ---- Boot ----
  bindTouchControls();
  resize();
  showScreen(SCREEN.TITLE);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
