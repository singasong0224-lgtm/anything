<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZeroDrop</title>
<style>
  :root {
    --bg0: #0a0e14;
    --bg1: #111824;
    --ink: #e8eef6;
    --ink-dim: #8a97a8;
    --accent: #5fd0c8;
    --panel: rgba(255, 255, 255, 0.04);
    --panel-line: rgba(255, 255, 255, 0.10);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg0);
    color: var(--ink);
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  #zd-root {
    position: relative;
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  canvas {
    display: block;
    touch-action: none;
    background:
      radial-gradient(1200px 600px at 50% -10%, #16202e 0%, transparent 60%),
      linear-gradient(180deg, var(--bg1) 0%, var(--bg0) 100%);
    border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  }
  /* DOM overlays for crisp text / buttons over the canvas */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 18px;
    padding: 24px;
  }
  .hidden { display: none !important; }
  .title-name {
    font-size: clamp(40px, 12vw, 64px);
    font-weight: 700;
    letter-spacing: 0.12em;
    margin: 0;
    background: linear-gradient(180deg, #eafcff, #6fe0d6 70%, #3aa9a0);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 30px rgba(95, 208, 200, 0.25);
  }
  .subtle {
    color: var(--ink-dim);
    font-size: 13px;
    letter-spacing: 0.08em;
    line-height: 1.7;
    margin: 0;
  }
  .btn {
    appearance: none;
    border: 1px solid var(--panel-line);
    background: var(--panel);
    color: var(--ink);
    font: inherit;
    font-size: 16px;
    letter-spacing: 0.06em;
    padding: 14px 30px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.08s ease, background 0.15s ease, border-color 0.15s ease;
  }
  .btn:hover { background: rgba(95, 208, 200, 0.10); border-color: rgba(95, 208, 200, 0.5); }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    border-color: rgba(95, 208, 200, 0.55);
    background: rgba(95, 208, 200, 0.14);
    color: #eafcff;
  }
  .result-title {
    font-size: clamp(32px, 9vw, 48px);
    font-weight: 700;
    letter-spacing: 0.14em;
    margin: 0;
  }
  .row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .footer-note {
    position: absolute;
    bottom: 10px;
    left: 0; right: 0;
    text-align: center;
    color: var(--ink-dim);
    font-size: 11px;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>
<div id="zd-root">
  <canvas id="zd-canvas"></canvas>

  <!-- Title -->
  <div class="overlay" id="overlay-title">
    <h1 class="title-name">ZeroDrop</h1>
    <p class="subtle">同じ色のクリスタルを4つ以上つなげて消す。<br>静かに、集中して。</p>
    <button class="btn btn-primary" id="btn-start">はじめる</button>
    <p class="subtle">← → 移動 ・ ↑/X/Z 回転 ・ ↓ 高速落下 ・ Space 即落下</p>
  </div>

  <!-- Result -->
  <div class="overlay hidden" id="overlay-result">
    <h2 class="result-title" id="result-title">おしまい</h2>
    <p class="subtle" id="result-score">スコア 0</p>
    <div class="row">
      <button class="btn btn-primary" id="btn-retry">もう一度</button>
      <button class="btn" id="btn-title">タイトルへ</button>
    </div>
  </div>

  <div class="footer-note">Phase 1 — core engine</div>
</div>

<script>
"use strict";
(function () {
  // =====================================================================
  // ZeroDrop — Phase 1: Core engine (single player, no interference)
  // Canvas 2D + Vanilla JS. No external libraries.
  // =====================================================================

  // ---- Field constants -------------------------------------------------
  const COLS = 6;
  const VISIBLE_ROWS = 12;
  const HIDDEN_ROWS = 2;            // spawn area above the visible field
  const ROWS = VISIBLE_ROWS + HIDDEN_ROWS; // internal grid height
  const CELL = 40;                  // logical cell size in px
  const NUM_COLORS = 5;

  const SPAWN_COL = 2;              // pivot spawn column (0-indexed)

  // Cell values: 0 = empty, 1..5 = colors. (9 reserved for future ojama.)
  const EMPTY = 0;

  // Color palette: cyan / magenta / yellow / lime / orange (original tones).
  const COLORS = {
    1: { core: "#7ff0ec", edge: "#1fb9b0", glow: "#9ffff9" }, // cyan
    2: { core: "#f58ad6", edge: "#c2389b", glow: "#ffb0e6" }, // magenta
    3: { core: "#f6e07a", edge: "#caa023", glow: "#fff0a8" }, // yellow
    4: { core: "#a7e87a", edge: "#5fae2f", glow: "#c8ffa0" }, // lime
    5: { core: "#f6a96a", edge: "#cc6a1f", glow: "#ffc999" }, // orange
  };

  // ---- Timing ----------------------------------------------------------
  const GRAVITY_MS = 650;           // time per 1-row natural fall
  const SOFT_DROP_MS = 45;          // fall time while soft dropping
  const LOCK_DELAY_MS = 0;          // (kept 0 in Phase 1 for crisp feel)
  const CLEAR_FLASH_MS = 330;       // flash before clearing a group
  const SETTLE_PAUSE_MS = 110;      // small pause between chain steps
  const SPAWN_PAUSE_MS = 90;

  // ---- Geometry helpers ------------------------------------------------
  // Orientation of the satellite relative to the pivot.
  // 0 = up, 1 = right, 2 = down, 3 = left
  function childOffset(orient) {
    switch (orient & 3) {
      case 0: return { dr: -1, dc: 0 };
      case 1: return { dr: 0, dc: 1 };
      case 2: return { dr: 1, dc: 0 };
      default: return { dr: 0, dc: -1 };
    }
  }

  function randColor() {
    return 1 + Math.floor(Math.random() * NUM_COLORS);
  }

  // =====================================================================
  // Board — holds one field's full state. Kept self-contained so Phase 2
  // can instantiate two of them side by side.
  // =====================================================================
  class Board {
    constructor() {
      this.reset();
    }

    reset() {
      this.grid = [];
      for (let r = 0; r < ROWS; r++) {
        this.grid.push(new Array(COLS).fill(EMPTY));
      }
      this.piece = null;        // active falling pair
      this.next = this.makePair();
      this.score = 0;
      this.chain = 0;           // current chain depth during resolution
      this.maxChain = 0;
      this.particles = [];
      this.clearing = [];       // cells flashing before removal
      this.phase = "control";   // control | clearing | settle | spawn | over
      this.timer = 0;           // generic phase timer (ms)
      this.fallTimer = 0;       // accumulator for natural fall
      this.softDrop = false;
      this.gameOver = false;
      this.flashT = 0;          // 0..1 animation phase for clearing flash
      this.spawnPiece();
    }

    makePair() {
      return { a: randColor(), b: randColor() };
    }

    // Place a new active piece from the "next" queue.
    spawnPiece() {
      const pair = this.next;
      this.next = this.makePair();
      this.piece = {
        row: HIDDEN_ROWS - 1,   // pivot starts in the hidden spawn area
        col: SPAWN_COL,
        orient: 0,              // satellite above pivot
        a: pair.a,              // pivot color
        b: pair.b,              // satellite color
        offsetY: 0,             // visual interpolation (0..1 of a cell)
      };
      // Game over: spawn cells already occupied.
      const childRow = this.piece.row + childOffset(0).dr;
      if (!this.isFree(this.piece.row, this.piece.col) ||
          !this.isFree(childRow, this.piece.col)) {
        this.gameOver = true;
        this.phase = "over";
        this.piece = null;
      } else {
        this.phase = "control";
        this.fallTimer = 0;
      }
    }

    isFree(row, col) {
      if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return false;
      return this.grid[row][col] === EMPTY;
    }

    // Cells occupied by the active piece at a given (row,col,orient).
    cellsOf(row, col, orient) {
      const o = childOffset(orient);
      return [
        { row: row, col: col },
        { row: row + o.dr, col: col + o.dc },
      ];
    }

    fits(row, col, orient) {
      const cells = this.cellsOf(row, col, orient);
      for (const c of cells) {
        if (!this.isFree(c.row, c.col)) return false;
      }
      return true;
    }

    // ---- Player actions ----
    move(dir) {
      if (this.phase !== "control" || !this.piece) return;
      const p = this.piece;
      if (this.fits(p.row, p.col + dir, p.orient)) {
        p.col += dir;
      }
    }

    rotate(dir) {
      if (this.phase !== "control" || !this.piece) return;
      const p = this.piece;
      const no = (p.orient + (dir > 0 ? 1 : 3)) & 3;
      if (this.fits(p.row, p.col, no)) {
        p.orient = no;
        return;
      }
      // Wall kicks: try nudging the pivot opposite the satellite.
      const o = childOffset(no);
      const kicks = [
        { dr: 0, dc: -o.dc }, // push horizontally away from satellite
        { dr: -o.dr, dc: 0 }, // push vertically away from satellite
        { dr: 0, dc: o.dc ? 0 : (p.col < COLS / 2 ? 1 : -1) },
      ];
      for (const k of kicks) {
        if (this.fits(p.row + k.dr, p.col + k.dc, no)) {
          p.row += k.dr;
          p.col += k.dc;
          p.orient = no;
          return;
        }
      }
    }

    setSoftDrop(on) {
      this.softDrop = on;
    }

    hardDrop() {
      if (this.phase !== "control" || !this.piece) return;
      const p = this.piece;
      while (this.fits(p.row + 1, p.col, p.orient)) {
        p.row += 1;
      }
      p.offsetY = 0;
      this.lockPiece();
    }

    // ---- Locking & resolution ----
    lockPiece() {
      const p = this.piece;
      const cells = this.cellsOf(p.row, p.col, p.orient);
      // Pivot is colour a, satellite is colour b.
      this.grid[cells[0].row][cells[0].col] = p.a;
      if (cells[1].row >= 0 && cells[1].row < ROWS) {
        this.grid[cells[1].row][cells[1].col] = p.b;
      }
      this.piece = null;
      this.applyGravity();
      this.beginResolve();
    }

    // Compact every column so floating cells fall to the bottom.
    applyGravity() {
      for (let c = 0; c < COLS; c++) {
        let write = ROWS - 1;
        for (let r = ROWS - 1; r >= 0; r--) {
          if (this.grid[r][c] !== EMPTY) {
            const v = this.grid[r][c];
            this.grid[r][c] = EMPTY;
            this.grid[write][c] = v;
            write--;
          }
        }
      }
    }

    // Find all connected same-colour groups of size >= 4.
    findGroups() {
      const seen = [];
      for (let r = 0; r < ROWS; r++) seen.push(new Array(COLS).fill(false));
      const groups = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const v = this.grid[r][c];
          if (v === EMPTY || v === 9 || seen[r][c]) continue;
          // BFS flood fill on matching colour (orthogonal only).
          const stack = [[r, c]];
          seen[r][c] = true;
          const group = [];
          while (stack.length) {
            const [cr, cc] = stack.pop();
            group.push({ row: cr, col: cc });
            const nb = [[cr - 1, cc], [cr + 1, cc], [cr, cc - 1], [cr, cc + 1]];
            for (const [nr, ncc] of nb) {
              if (nr < 0 || nr >= ROWS || ncc < 0 || ncc >= COLS) continue;
              if (seen[nr][ncc]) continue;
              if (this.grid[nr][ncc] === v) {
                seen[nr][ncc] = true;
                stack.push([nr, ncc]);
              }
            }
          }
          if (group.length >= 4) groups.push(group);
        }
      }
      return groups;
    }

    beginResolve() {
      const groups = this.findGroups();
      if (groups.length === 0) {
        // Nothing to clear: hand control back (or spawn the next piece).
        this.chain = 0;
        this.phase = "spawn";
        this.timer = SPAWN_PAUSE_MS;
        return;
      }
      this.chain += 1;
      if (this.chain > this.maxChain) this.maxChain = this.chain;

      // Mark cells for the flash, count for scoring.
      let count = 0;
      this.clearing = [];
      for (const g of groups) {
        for (const cell of g) {
          this.clearing.push(cell);
          count += 1;
        }
      }
      // Score: cleared * 10 * 2^(chain-1)  (exponential chain bonus).
      const bonus = Math.pow(2, this.chain - 1);
      this.score += Math.round(count * 10 * bonus);

      this.phase = "clearing";
      this.timer = CLEAR_FLASH_MS;
      this.flashT = 0;
    }

    finishClearing() {
      // Spawn shatter particles, then empty the cells.
      for (const cell of this.clearing) {
        const v = this.grid[cell.row][cell.col];
        this.spawnShatter(cell.col, cell.row, v);
        this.grid[cell.row][cell.col] = EMPTY;
      }
      this.clearing = [];
      this.applyGravity();
      // Continue the chain after a short settle pause.
      this.phase = "settle";
      this.timer = SETTLE_PAUSE_MS;
    }

    spawnShatter(col, row, colorId) {
      const col0 = COLORS[colorId] || COLORS[1];
      const cx = col * CELL + CELL / 2;
      const cy = (row - HIDDEN_ROWS) * CELL + CELL / 2;
      const n = 7;
      for (let i = 0; i < n; i++) {
        const ang = (Math.PI * 2 * i) / n + Math.random() * 0.6;
        const sp = 60 + Math.random() * 130;
        this.particles.push({
          x: cx, y: cy,
          vx: Math.cos(ang) * sp,
          vy: Math.sin(ang) * sp - 40,
          life: 1,
          size: 4 + Math.random() * 5,
          rot: Math.random() * Math.PI,
          vr: (Math.random() - 0.5) * 8,
          color: col0.core,
        });
      }
    }

    // ---- Per-frame update ----
    update(dt) {
      // Particles run regardless of phase.
      this.updateParticles(dt);

      if (this.phase === "control" && this.piece) {
        const interval = this.softDrop ? SOFT_DROP_MS : GRAVITY_MS;
        this.fallTimer += dt;
        // Smooth visual interpolation between rows.
        this.piece.offsetY = Math.min(1, this.fallTimer / interval);
        while (this.fallTimer >= interval) {
          this.fallTimer -= interval;
          const p = this.piece;
          if (this.fits(p.row + 1, p.col, p.orient)) {
            p.row += 1;
          } else {
            p.offsetY = 0;
            this.lockPiece();
            return;
          }
        }
      } else if (this.phase === "clearing") {
        this.timer -= dt;
        this.flashT = 1 - Math.max(0, this.timer) / CLEAR_FLASH_MS;
        if (this.timer <= 0) this.finishClearing();
      } else if (this.phase === "settle") {
        this.timer -= dt;
        if (this.timer <= 0) this.beginResolve();
      } else if (this.phase === "spawn") {
        this.timer -= dt;
        if (this.timer <= 0) this.spawnPiece();
      }
    }

    updateParticles(dt) {
      const s = dt / 1000;
      for (const pt of this.particles) {
        pt.vy += 520 * s;       // gravity on shards
        pt.x += pt.vx * s;
        pt.y += pt.vy * s;
        pt.rot += pt.vr * s;
        pt.life -= s * 1.7;
      }
      this.particles = this.particles.filter((p) => p.life > 0);
    }
  }

  // =====================================================================
  // Renderer — pure drawing from Board state. No game logic here.
  // =====================================================================
  function drawCrystal(ctx, x, y, size, colorId, opts) {
    opts = opts || {};
    const col = COLORS[colorId] || COLORS[1];
    const cx = x + size / 2;
    const cy = y + size / 2;
    const r = size * 0.40;
    const alpha = opts.alpha == null ? 1 : opts.alpha;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(cx, cy);

    // Outer glow.
    const glow = ctx.createRadialGradient(0, 0, r * 0.2, 0, 0, r * 1.5);
    glow.addColorStop(0, hexA(col.glow, 0.55 * alpha));
    glow.addColorStop(1, hexA(col.glow, 0));
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, r * 1.5, 0, Math.PI * 2);
    ctx.fill();

    // Hexagonal crystal body.
    const sides = 6;
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const ang = -Math.PI / 2 + (Math.PI * 2 * i) / sides;
      const px = Math.cos(ang) * r;
      const py = Math.sin(ang) * r;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();

    const body = ctx.createLinearGradient(0, -r, 0, r);
    body.addColorStop(0, col.core);
    body.addColorStop(1, col.edge);
    ctx.fillStyle = body;
    ctx.fill();

    // Inner glow / facet highlight.
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const ang = -Math.PI / 2 + (Math.PI * 2 * i) / sides;
      const px = Math.cos(ang) * r * 0.5;
      const py = Math.sin(ang) * r * 0.5;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fillStyle = hexA("#ffffff", 0.22 * alpha);
    ctx.fill();

    // Crisp edge.
    ctx.lineWidth = Math.max(1, size * 0.045);
    ctx.strokeStyle = hexA(col.glow, 0.7 * alpha);
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const ang = -Math.PI / 2 + (Math.PI * 2 * i) / sides;
      const px = Math.cos(ang) * r;
      const py = Math.sin(ang) * r;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.stroke();

    ctx.restore();
  }

  function hexA(hex, a) {
    // hex "#rrggbb" -> rgba string
    const h = hex.replace("#", "");
    const r = parseInt(h.substring(0, 2), 16);
    const g = parseInt(h.substring(2, 4), 16);
    const b = parseInt(h.substring(4, 6), 16);
    return "rgba(" + r + "," + g + "," + b + "," + a + ")";
  }

  // =====================================================================
  // Game shell — canvas sizing, loop, input, screen state.
  // =====================================================================
  const canvas = document.getElementById("zd-canvas");
  const ctx = canvas.getContext("2d");

  // Layout: field on the left, an info panel on the right.
  const PANEL_W = 130;
  const PAD = 16;
  const FIELD_W = COLS * CELL;
  const FIELD_H = VISIBLE_ROWS * CELL;
  const BASE_W = FIELD_W + PANEL_W + PAD * 3;
  const BASE_H = FIELD_H + PAD * 2;

  let dpr = 1;
  let viewScale = 1;

  function resize() {
    const root = document.getElementById("zd-root");
    const maxW = Math.min(root.clientWidth, 520) - 0;
    const availH = window.innerHeight;
    // Fit the base layout into the available space.
    const scaleW = maxW / BASE_W;
    const scaleH = availH / BASE_H;
    viewScale = Math.min(scaleW, scaleH, 1.4);
    if (viewScale <= 0 || !isFinite(viewScale)) viewScale = 1;

    dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(BASE_W * viewScale * dpr);
    canvas.height = Math.round(BASE_H * viewScale * dpr);
    canvas.style.width = Math.round(BASE_W * viewScale) + "px";
    canvas.style.height = Math.round(BASE_H * viewScale) + "px";
  }
  window.addEventListener("resize", resize);

  // Background ambient particles (purely decorative).
  const ambient = [];
  for (let i = 0; i < 26; i++) {
    ambient.push({
      x: Math.random() * BASE_W,
      y: Math.random() * BASE_H,
      r: 0.6 + Math.random() * 1.8,
      vy: 4 + Math.random() * 10,
      a: 0.05 + Math.random() * 0.18,
    });
  }
  function updateAmbient(dt) {
    const s = dt / 1000;
    for (const p of ambient) {
      p.y -= p.vy * s;
      if (p.y < -4) { p.y = BASE_H + 4; p.x = Math.random() * BASE_W; }
    }
  }

  // ---- Screen state machine -------------------------------------------
  const SCREEN = { TITLE: "title", PLAYING: "playing", RESULT: "result" };
  let screen = SCREEN.TITLE;
  let board = null;

  const elTitle = document.getElementById("overlay-title");
  const elResult = document.getElementById("overlay-result");
  const elResultTitle = document.getElementById("result-title");
  const elResultScore = document.getElementById("result-score");

  function showScreen(s) {
    screen = s;
    elTitle.classList.toggle("hidden", s !== SCREEN.TITLE);
    elResult.classList.toggle("hidden", s !== SCREEN.RESULT);
  }

  function startGame() {
    board = new Board();
    showScreen(SCREEN.PLAYING);
  }

  function endGame() {
    showScreen(SCREEN.RESULT);
    elResultTitle.textContent = "おしまい";
    elResultScore.textContent =
      "スコア " + board.score + "　/　最大 " + board.maxChain + " 連鎖";
  }

  document.getElementById("btn-start").addEventListener("click", startGame);
  document.getElementById("btn-retry").addEventListener("click", startGame);
  document.getElementById("btn-title").addEventListener("click", function () {
    showScreen(SCREEN.TITLE);
  });

  // ---- Keyboard input --------------------------------------------------
  const keyHeld = {};
  window.addEventListener("keydown", function (e) {
    if (screen !== SCREEN.PLAYING || !board) return;
    let handled = true;
    switch (e.key) {
      case "ArrowLeft": board.move(-1); break;
      case "ArrowRight": board.move(1); break;
      case "ArrowUp":
      case "x":
      case "X": board.rotate(1); break;
      case "z":
      case "Z": board.rotate(-1); break;
      case "ArrowDown":
        board.setSoftDrop(true);
        keyHeld.down = true;
        break;
      case " ":
        if (!keyHeld.space) { board.hardDrop(); keyHeld.space = true; }
        break;
      default: handled = false;
    }
    if (handled) e.preventDefault();
  });
  window.addEventListener("keyup", function (e) {
    if (e.key === "ArrowDown") { if (board) board.setSoftDrop(false); keyHeld.down = false; }
    if (e.key === " ") keyHeld.space = false;
  });

  // ---- Touch input -----------------------------------------------------
  let touch = null;
  canvas.addEventListener("touchstart", function (e) {
    if (screen !== SCREEN.PLAYING) return;
    const t = e.changedTouches[0];
    touch = { x0: t.clientX, y0: t.clientY, x: t.clientX, y: t.clientY,
              t0: performance.now(), movedCol: 0, soft: false };
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener("touchmove", function (e) {
    if (!touch || !board) return;
    const t = e.changedTouches[0];
    touch.x = t.clientX; touch.y = t.clientY;
    const stepPx = 26;
    const dx = touch.x - touch.x0;
    const dy = touch.y - touch.y0;
    // Horizontal swipe -> column moves.
    const wantCol = Math.round(dx / stepPx);
    while (touch.movedCol < wantCol) { board.move(1); touch.movedCol++; }
    while (touch.movedCol > wantCol) { board.move(-1); touch.movedCol--; }
    // Downward swipe -> soft drop.
    const soft = dy > 24 && Math.abs(dy) > Math.abs(dx);
    if (soft !== touch.soft) { board.setSoftDrop(soft); touch.soft = soft; }
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener("touchend", function (e) {
    if (!touch || !board) { touch = null; return; }
    const dt = performance.now() - touch.t0;
    const dx = touch.x - touch.x0;
    const dy = touch.y - touch.y0;
    const dist = Math.hypot(dx, dy);
    if (board) board.setSoftDrop(false);
    // A short, still tap = rotate.
    if (dt < 250 && dist < 16 && touch.movedCol === 0) {
      board.rotate(1);
    }
    touch = null;
    e.preventDefault();
  }, { passive: false });

  // ---- Render ----------------------------------------------------------
  function render() {
    ctx.save();
    ctx.scale(viewScale * dpr, viewScale * dpr);
    ctx.clearRect(0, 0, BASE_W, BASE_H);

    // Ambient particles behind everything.
    for (const p of ambient) {
      ctx.fillStyle = hexA("#bfe9e4", p.a);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }

    if (screen === SCREEN.PLAYING || screen === SCREEN.RESULT) {
      if (board) renderBoard(board);
    }

    ctx.restore();
  }

  function renderBoard(b) {
    const ox = PAD;
    const oy = PAD;

    // Field frame.
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,0.28)";
    roundRect(ctx, ox - 6, oy - 6, FIELD_W + 12, FIELD_H + 12, 12);
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.08)";
    ctx.lineWidth = 1;
    roundRect(ctx, ox - 6, oy - 6, FIELD_W + 12, FIELD_H + 12, 12);
    ctx.stroke();

    // Clip to field for cells.
    ctx.save();
    roundRect(ctx, ox, oy, FIELD_W, FIELD_H, 6);
    ctx.clip();

    // Subtle column grid.
    ctx.strokeStyle = "rgba(255,255,255,0.035)";
    ctx.lineWidth = 1;
    for (let c = 1; c < COLS; c++) {
      ctx.beginPath();
      ctx.moveTo(ox + c * CELL, oy);
      ctx.lineTo(ox + c * CELL, oy + FIELD_H);
      ctx.stroke();
    }

    // Settled cells (skip hidden spawn rows).
    const clearingSet = new Set(b.clearing.map((c) => c.row * COLS + c.col));
    for (let r = HIDDEN_ROWS; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const v = b.grid[r][c];
        if (v === EMPTY) continue;
        const x = ox + c * CELL;
        const y = oy + (r - HIDDEN_ROWS) * CELL;
        let alpha = 1;
        if (clearingSet.has(r * COLS + c)) {
          // Flash: pulse brightness, then fade out near the end.
          const f = b.flashT;
          const pulse = 0.55 + 0.45 * Math.abs(Math.sin(f * Math.PI * 3));
          alpha = f > 0.7 ? pulse * (1 - (f - 0.7) / 0.3) : pulse;
        }
        drawCrystal(ctx, x, y, CELL, v, { alpha: alpha });
      }
    }

    // Active piece.
    if (b.piece && b.phase === "control") {
      const p = b.piece;
      const o = childOffset(p.orient);
      const interp = (p.softDropVisual ? 0 : p.offsetY) || p.offsetY;
      const py = (p.row - HIDDEN_ROWS + interp) * CELL;
      // pivot
      drawPieceCell(ox, oy, p.col, py, p.a);
      // satellite
      const cy = (p.row + o.dr - HIDDEN_ROWS + interp) * CELL;
      drawPieceCell(ox, oy, p.col + o.dc, cy, p.b);
    }

    // Particles (shatter).
    for (const pt of b.particles) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, pt.life));
      ctx.translate(ox + pt.x, oy + pt.y);
      ctx.rotate(pt.rot);
      ctx.fillStyle = pt.color;
      ctx.fillRect(-pt.size / 2, -pt.size / 2, pt.size, pt.size);
      ctx.restore();
    }

    ctx.restore(); // end clip

    // Game over veil.
    if (b.gameOver) {
      ctx.fillStyle = "rgba(8,12,18,0.55)";
      roundRect(ctx, ox, oy, FIELD_W, FIELD_H, 6);
      ctx.fill();
    }

    ctx.restore();

    // ---- Side panel ----
    renderPanel(b);
  }

  function drawPieceCell(ox, oy, col, yWithinField, colorId) {
    // Cells above the visible area are not drawn.
    if (yWithinField + CELL <= 0) return;
    drawCrystal(ctx, ox + col * CELL, oy + yWithinField, CELL, colorId, {});
  }

  function renderPanel(b) {
    const px = PAD * 2 + FIELD_W;
    const py = PAD;

    ctx.save();
    ctx.fillStyle = "rgba(255,255,255,0.035)";
    roundRect(ctx, px, py, PANEL_W, FIELD_H, 12);
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.08)";
    ctx.lineWidth = 1;
    roundRect(ctx, px, py, PANEL_W, FIELD_H, 12);
    ctx.stroke();

    const cx = px + PANEL_W / 2;
    let y = py + 24;

    ctx.textAlign = "center";
    ctx.fillStyle = "#8a97a8";
    ctx.font = "12px system-ui, sans-serif";
    ctx.fillText("NEXT", cx, y);

    // Next pair preview (stacked).
    const ps = CELL * 0.8;
    const nx = cx - ps / 2;
    y += 14;
    drawCrystal(ctx, nx, y, ps, b.next.b, {});      // satellite (top)
    drawCrystal(ctx, nx, y + ps, ps, b.next.a, {});  // pivot (bottom)

    y += ps * 2 + 34;
    ctx.fillStyle = "#8a97a8";
    ctx.font = "12px system-ui, sans-serif";
    ctx.fillText("SCORE", cx, y);
    y += 26;
    ctx.fillStyle = "#e8eef6";
    ctx.font = "700 22px system-ui, sans-serif";
    ctx.fillText(String(b.score), cx, y);

    y += 40;
    ctx.fillStyle = "#8a97a8";
    ctx.font = "12px system-ui, sans-serif";
    ctx.fillText("CHAIN", cx, y);
    y += 24;
    ctx.fillStyle = b.chain > 0 ? "#7fe0d6" : "#46525f";
    ctx.font = "700 20px system-ui, sans-serif";
    ctx.fillText(b.chain > 0 ? b.chain + " 連鎖" : "—", cx, y);

    ctx.restore();
  }

  function roundRect(ctx, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ---- Main loop -------------------------------------------------------
  let last = performance.now();
  function loop(now) {
    let dt = now - last;
    last = now;
    if (dt > 100) dt = 100; // clamp after tab switches

    updateAmbient(dt);

    if (screen === SCREEN.PLAYING && board) {
      board.update(dt);
      if (board.gameOver && !board._ended) {
        board._ended = true;
        // brief pause so the final state is visible before the result screen
        setTimeout(endGame, 700);
      }
    } else if (board) {
      // Keep particles alive on the result screen.
      board.updateParticles(dt);
    }

    render();
    requestAnimationFrame(loop);
  }

  // ---- Boot ------------------------------------------------------------
  resize();
  showScreen(SCREEN.TITLE);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
